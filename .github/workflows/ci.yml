name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'website/**'
      - 'specs/**'
      - '.claude/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'website/**'
      - 'specs/**'
      - '.claude/**'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install clipboard utilities
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y xclip xvfb
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: go test ./tests/unit/ -count=1 -timeout 120s -race
      - name: Run tests (with virtual display)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run go test ./tests/unit/ -count=1 -timeout 120s -race
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run go test ./internal/... ./tests/... -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: go build -trimpath -o a9s ./cmd/a9s/
      - name: Verify binary
        run: ./a9s --version

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  verify-readonly:
    name: Verify Read-Only APIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for write API calls
        run: make verify-readonly

  install-test:
    name: Install Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test go install
        run: go install ./cmd/a9s/
      - name: Verify installed binary
        run: a9s --version
      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check
