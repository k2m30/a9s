name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]

permissions:
  contents: read
  # AS-104: test-budget job upserts a sticky PR comment with the wall/budget table.
  pull-requests: write

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      md: ${{ steps.filter.outputs.md }}
      not_docs: ${{ steps.filter.outputs.not_docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              # AS-114 (Codex Stage 5): script-only edits to the budget gate
              # must re-run the gate, otherwise an unvalidated change to the
              # enforcement path can merge with the test-budget job skipped.
              - 'scripts/test-budget-gate.sh'
              # AS-1246: .goreleaser.yaml is validated inside the Build job
              # (`goreleaser check`). Without it in this filter, a goreleaser
              # config regression can land via a docs-classified PR with the
              # Build job stubbed — the exact gap that let AS-1243/PR #414 sit
              # broken when goreleaser v2.16 escalated the brews deprecation.
              - '.goreleaser.yaml'
            md:
              - '**/*.md'
            not_docs:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!website/**'
              - '!specs/**'
              - '!.claude/**'
              - '!LICENSE'

  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.go == 'true'
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.11.3
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Lint stub
        run: echo "No Go-affecting paths changed; Lint stub passing per docs-only CI shim."

  test:
    name: Test (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            race: true
          - os: macos-latest
            race: false
          - os: windows-latest
            race: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run tests (with race detector)
        if: needs.changes.outputs.go == 'true' && matrix.race
        run: go test ./tests/unit/... -count=1 -timeout 600s -shuffle=on -race
      - name: Run tests
        if: needs.changes.outputs.go == 'true' && !matrix.race
        run: go test ./tests/unit/... -count=1 -timeout 600s -shuffle=on
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Test stub
        run: echo "No Go-affecting paths changed; Test stub passing per docs-only CI shim."

  test-budget:
    # AS-104 — fail the build if `make test` (non-race) exceeds the
    # 5-minute Stage 6 wall budget on ubuntu-latest. macOS/Windows are
    # observed via the `test` matrix but not gated here. Race timing is
    # non-deterministic across runners and is exercised by the nightly
    # matrix per AS-25.
    name: Test budget (5m wall)
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.go == 'true'
        name: Capture test-suite wall time
        run: scripts/test-budget-gate.sh capture
      - if: always() && needs.changes.outputs.go == 'true'
        name: Upload test-budget artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-budget
          path: test-budget.json
          if-no-files-found: ignore
      - if: needs.changes.outputs.go == 'true'
        name: Gate against 5-minute budget
        run: scripts/test-budget-gate.sh gate
      - if: always() && needs.changes.outputs.go == 'true'
        name: Upsert sticky PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- a9s-test-budget-gate -->';
            let body;
            try {
              const raw = fs.readFileSync('test-budget.json', 'utf8');
              const data = JSON.parse(raw);
              const wall = data.wall_seconds;
              const budget = data.budget_seconds;
              const headroom = data.headroom_seconds;
              const headroomPct = data.headroom_pct;
              let status;
              if (wall > budget) {
                status = '❌ over budget';
              } else if (headroom < 60) {
                status = '⚠️ within 1m of budget';
              } else {
                status = '✅ under budget';
              }
              body = [
                MARKER,
                '### Test-suite wall budget',
                '',
                '| metric | value |',
                '| --- | --- |',
                `| wall | ${wall}s |`,
                `| budget | ${budget}s |`,
                `| headroom | ${headroom}s (${headroomPct}%) |`,
                `| status | ${status} |`,
                `| os | ${data.os} |`,
                `| go | ${data.go_version} |`,
                `| sha | ${data.git_sha} |`,
                '',
                'See `docs/development-process.md` §"Test suite wall budget".',
              ].join('\n');
            } catch (err) {
              body = [
                MARKER,
                '### Test-suite wall budget',
                '',
                `Failed to read \`test-budget.json\`: ${err.message}`,
              ].join('\n');
            }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Test budget stub
        run: echo "No Go-affecting paths changed; Test budget stub passing per docs-only CI shim."

  build:
    name: Build
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.go == 'true'
        name: Build binary
        run: go build -trimpath -o a9s ./cmd/a9s/
      - if: needs.changes.outputs.go == 'true'
        name: Verify binary
        run: ./a9s --version
      - if: needs.changes.outputs.go == 'true'
        name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8  # v7.2.1
        with:
          version: "~> v2"
          args: check
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Build stub
        run: echo "No Go-affecting paths changed; Build stub passing per docs-only CI shim."

  security:
    name: Security
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  verify-readonly:
    name: Verify Read-Only APIs
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check for write API calls
        run: make verify-readonly

  integration:
    # AS-827 — permanent Stage-5 gate. Mirrors `make integration` locally and
    # the supplement command on PR #392 (`go test -tags integration
    # ./tests/integration/ -count=1 -timeout 300s`). Ubuntu-only by design:
    # integration tests target the linux runner shape; cross-OS coverage
    # belongs to the `test` matrix.
    name: Integration
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: make integration

  markdown-lint:
    name: Markdown lint
    if: github.event_name == 'pull_request' && (needs.changes.outputs.not_docs != 'true' || needs.changes.outputs.md == 'true')
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
      - name: Run markdownlint-cli2
        # TODO(AS-36): drop the docs/refactor/** exclusion once phase-03 lands
        # and refactor-doc churn stops. Excluding here keeps unrelated doc PRs
        # from being gated by in-flight refactor-doc lint regressions (see AS-85).
        run: npx --yes markdownlint-cli2 "docs/**/*.md" "!docs/refactor/**" "CLAUDE.md" "CONTRIBUTING.md" "CHANGELOG.md"

  coverage:
    name: Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install clipboard utilities
        run: sudo apt-get install -y xclip xvfb
      - name: Run tests with coverage
        run: xvfb-run go test ./internal/... ./tests/... -coverpkg=./internal/... -coverprofile=coverage.out -covermode=atomic -timeout 120s -race
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
