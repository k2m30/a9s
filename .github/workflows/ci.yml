name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      md: ${{ steps.filter.outputs.md }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            md:
              - '**/*.md'

  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.go == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Lint stub
        run: echo "No Go-affecting paths changed; Lint stub passing per docs-only CI shim."

  test:
    name: Test (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.go == 'true'
        name: Run tests
        run: go test ./tests/unit/ -count=1 -timeout 120s -race
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Test stub
        run: echo "No Go-affecting paths changed; Test stub passing per docs-only CI shim."

  build:
    name: Build
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - if: needs.changes.outputs.go == 'true'
        name: Build binary
        run: go build -trimpath -o a9s ./cmd/a9s/
      - if: needs.changes.outputs.go == 'true'
        name: Verify binary
        run: ./a9s --version
      - if: needs.changes.outputs.go == 'true'
        name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check
      - if: needs.changes.outputs.go != 'true'
        name: Docs-only PR — Build stub
        run: echo "No Go-affecting paths changed; Build stub passing per docs-only CI shim."

  security:
    name: Security
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  verify-readonly:
    name: Verify Read-Only APIs
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for write API calls
        run: make verify-readonly

  markdown-lint:
    name: Markdown lint
    if: github.event_name == 'pull_request' && needs.changes.outputs.md == 'true'
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run markdownlint-cli2
        run: npx --yes markdownlint-cli2 "docs/**/*.md" "CLAUDE.md" "CONTRIBUTING.md" "CHANGELOG.md"

  coverage:
    name: Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install clipboard utilities
        run: sudo apt-get install -y xclip xvfb
      - name: Run tests with coverage
        run: xvfb-run go test ./internal/... ./tests/... -coverpkg=./internal/... -coverprofile=coverage.out -covermode=atomic -timeout 120s -race
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
