# markdownlint configuration for a9s
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Disable line length — prose wraps at editor width, not 80 chars
MD013: false

# Allow multiple top-level headings (some docs have multiple sections)
MD025: false

# Allow inline HTML (used in README template)
MD033: false

# Disable table column style — compact tables are intentional
MD060: false

# Allow lists without blank lines above (common pattern: bold label then list)
MD032: false

# Allow fenced code blocks without a language tag — many spec/transcript blocks
# are language-agnostic (raw shell output, tree dumps, ASCII tables).
MD040: false

# Keep a Changelog format intentionally repeats Added/Changed/Fixed/Removed
# section names per release entry; that's the schema, not duplication.
MD024: false

# docs/shared/ are Hugo include fragments and don't start with a top-level
# heading by design; the parent template provides the H1.
MD041: false

# Allow heading levels to skip (e.g. ## directly to #### for grouped sub-blocks).
MD001: false

# Allow inconsistent table column counts — some spec tables use a varying number
# of separator columns intentionally for visual grouping.
MD056: false
