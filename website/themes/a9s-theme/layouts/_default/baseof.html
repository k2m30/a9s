<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} | a9s</title>
  <meta name="description" content="Terminal UI AWS Resource Manager — browse, inspect, and manage 60+ AWS resource types">
  <meta property="og:title" content="a9s — Terminal UI for AWS">
  <meta property="og:description" content="Like k9s, but for your cloud. Browse 62 AWS resource types from your terminal.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://k2m30.github.io/a9s/">
  <style>
    :root {
      --bg: #1a1b26;
      --bg-dark: #16161e;
      --fg: #a9b1d6;
      --fg-bright: #c0caf5;
      --accent: #7aa2f7;
      --accent2: #bb9af7;
      --green: #9ece6a;
      --border: #3b4261;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
    header {
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { color: var(--accent); font-size: 1.4rem; }
    header nav a { margin-left: 24px; color: var(--fg); font-size: 0.9rem; }
    header nav a:hover { color: var(--accent); }
    .hero {
      text-align: center;
      padding: 80px 20px 60px;
    }
    .hero h2 {
      font-size: 2.8rem;
      color: var(--fg-bright);
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 1.2rem;
      color: var(--fg);
      max-width: 600px;
      margin: 0 auto 32px;
    }
    .hero .tagline {
      color: var(--accent2);
      font-style: italic;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }
    .install-box {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 24px;
      display: inline-block;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1rem;
      color: var(--green);
      margin-bottom: 32px;
    }
    .install-box span { color: var(--fg); margin-right: 8px; }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      padding: 60px 0;
    }
    .feature {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }
    .feature h3 { color: var(--accent); margin-bottom: 8px; font-size: 1.1rem; }
    .feature p { font-size: 0.95rem; }
    .cta { text-align: center; padding: 40px 0 80px; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: var(--bg-dark);
      padding: 12px 32px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      margin: 0 8px;
    }
    .btn:hover { opacity: 0.9; text-decoration: none; }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--fg);
    }
    .stats { display: flex; justify-content: center; gap: 40px; margin: 32px 0; }
    .stat { text-align: center; }
    .stat .number { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat .label { font-size: 0.85rem; }
    /* Demo GIF placeholder */
    .demo {
      max-width: 800px;
      margin: 0 auto 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-dark);
      padding: 40px;
      text-align: center;
      color: var(--fg);
      font-style: italic;
    }
    section { padding: 40px 0; }
    section h2 { color: var(--fg-bright); margin-bottom: 24px; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--accent); font-weight: 600; }
    code {
      background: var(--bg-dark);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9em;
    }
    pre {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      color: var(--green);
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>a9s</h1>
      <nav>
        <a href="{{ "install/" | relURL }}">Install</a>
        <a href="{{ "docs/" | relURL }}">Docs</a>
        <a href="{{ "resources/" | relURL }}">Resources</a>
        <a href="https://github.com/k2m30/a9s">GitHub</a>
      </nav>
    </div>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer>
    <div class="container">
      <p>a9s is open source (GPL-3.0-or-later) | <a href="https://github.com/k2m30/a9s">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
