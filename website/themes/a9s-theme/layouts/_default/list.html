{{ define "main" }}
<div class="container" style="padding: 40px 20px 80px;">
  <h2 style="color: var(--fg-bright); margin-bottom: 24px;">{{ .Title }}</h2>
  {{ .Content }}
  {{ range .Pages }}
  <div style="margin-bottom: 16px;">
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </div>
  {{ end }}
</div>
{{ end }}
