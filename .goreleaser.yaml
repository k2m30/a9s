version: 2

builds:
  - id: a9s
    main: ./cmd/a9s
    binary: a9s
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-buildvcs=false
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

homebrew_casks:
  - repository:
      owner: k2m30
      name: homebrew-a9s
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/k2m30/a9s
    description: Terminal UI AWS Resource Manager
    license: GPL-3.0-or-later

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}

release:
  prerelease: auto
