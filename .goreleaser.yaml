version: 2

before:
  hooks:
    - go mod download

builds:
  - id: a9s
    main: ./cmd/a9s
    binary: a9s
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: a9s
    binaries:
      - a9s
    repository:
      owner: k2m30
      name: homebrew-a9s
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/k2m30/a9s
    description: Terminal UI AWS Resource Manager

scoops:
  - repository:
      owner: k2m30
      name: scoop-a9s
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: https://github.com/k2m30/a9s
    description: Terminal UI AWS Resource Manager
    license: GPL-3.0-or-later

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: auto
  header: |
    {{ .Env.RELEASE_NOTES }}
