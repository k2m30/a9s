{{define "list.html"}}
{{if .Filter}}<div class="list-filter">Filter: {{.Filter}}</div>{{end}}
{{if .Loading}}<div class="list-loading">Loading…</div>{{end}}
<table class="list-table">
  <thead>
    <tr>
      {{range .Columns}}<th>{{.Title}}</th>{{end}}
    </tr>
  </thead>
  <tbody>
    {{range $i, $row := .Rows}}
    <tr class="{{if eq $i $.Selected}}selected{{end}}{{if eq $row.Decorator "!"}} dec-error{{else if eq $row.Decorator "~"}} dec-warn{{end}}"
        onclick="clickSelect({{$i}})">
      {{range $row.Cells}}<td>{{.}}</td>{{end}}
    </tr>
    {{end}}
  </tbody>
</table>
{{if .Truncated}}<div class="list-truncated">Results truncated — press m to load more</div>{{end}}
{{end}}
