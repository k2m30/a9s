# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for a9s — read-only AWS TUI (Go + Bubble Tea v2).
# Free for open-source: https://www.coderabbit.ai/open-source

language: en-US

tone_instructions: >
  Be direct and technical. This is a Go TUI project targeting experienced
  developers. Skip obvious observations; focus on bugs, architecture violations,
  and correctness. No emojis.

early_access: true
enable_free_tier: true

# ---------------------------------------------------------------------------
# Reviews
# ---------------------------------------------------------------------------
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  review_status: true
  commit_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false       # not useful for a TUI app
  poem: false
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: false        # we manage labels manually
  suggested_reviewers: false     # single-maintainer project
  abort_on_close: true

  # Slop detection — flag AI-generated filler
  slop_detection:
    enabled: true

  # -- Path filters: skip generated and vendored files --
  path_filters:
    - "!**/*_generated.go"
    - "!**/vendor/**"
    - "!**/*.pb.go"
    - "!README.md"                # generated by readmegen
    - "!.a9s/views/*.yaml"        # generated by viewsgen
    - "!.a9s/views_reference.yaml"  # generated by refgen
    - "!docs/shared/**"           # single-source docs (reviewed via readmegen)
    - "!website/**"               # Hugo site, separate review process

  # -- Path-specific review instructions --
  path_instructions:
    - path: "internal/tui/**"
      instructions: |
        This is a Bubble Tea v2 TUI application. Key rules:
        - No blocking I/O in Update() — all I/O must be in tea.Cmd closures
        - Views communicate via typed messages only (internal/tui/messages/messages.go)
        - Views must never import each other
        - Async results (related checks, enrichment) must include a Generation field
          and be validated against relatedGen/enrichGen to discard stale results
        - Key handling order: input modes first, then global keys (q, ?, i), then
          view-local delegation. q quits only in normal mode; Esc is back.
        - Every new view must implement SetSize and propagate it on WindowSizeMsg
        - Use lipgloss.Width() not len() for measuring styled strings

    - path: "internal/aws/**"
      instructions: |
        AWS fetcher layer. Key rules:
        - a9s is read-only by design — flag ANY write API call (Put*, Create*,
          Delete*, Update*, Modify*, Tag*, Untag*) as a critical issue
        - Fetchers must accept narrow interfaces (single-method) for testability,
          not the aggregate IAMAPI/EC2API etc.
        - URL-encoded IAM documents use RFC 3986 percent-encoding — must use
          url.PathUnescape, NOT url.QueryUnescape (+ must stay literal)
        - All fetcher registration happens in init() functions
        - Enricher caches must be cleared on profile switch (cross-account safety)

    - path: "internal/resource/**"
      instructions: |
        Resource model and registry layer. Key rules:
        - Registries (fetchers, enrichers, related, navigable fields) are
          package-level maps written only in init(), read at runtime
        - Resource.Fields is map[string]string; RawStruct is the typed AWS SDK struct
        - New registry patterns must follow the existing Register/Get/Has/Unregister
          convention (see enricher.go, registry.go)

    - path: "internal/demo/**"
      instructions: |
        Demo mode fixtures and fakes. Key rules:
        - Fakes must implement the full aggregate interface (e.g., IAMAPI)
        - New API methods added to aggregate interfaces need stub implementations
          on all fakes or the demo binary won't compile
        - Fixture data must use realistic but synthetic AWS account IDs and ARNs
          (never real account data)

    - path: "tests/unit/**"
      instructions: |
        Test code. Key rules:
        - Tests must verify behavior (what the user sees or what the function returns),
          not implementation details (internal state, private fields)
        - Two mock layers: narrow interface mocks for fetcher isolation tests,
          demo fakes (tui.WithDemo(true)) for full TUI behavior tests
        - Use stripANSI() before string assertions on rendered output
        - Clean up registries with t.Cleanup() for temporary registrations
        - Clean up caches (ClearPolicyDocumentCache) if tests exercise enrichers
        - Never use real AWS account IDs or profile names in test data

    - path: "internal/config/**"
      instructions: |
        View configuration system. Key rules:
        - defaults_*.go files define built-in view configs per service category
        - After changing defaults, regenerate: go run ./cmd/viewsgen/
        - After changing RawStruct fields, regenerate: go run ./cmd/refgen/
        - Column Path (SDK field path via reflection) vs Key (pre-extracted Fields map key)

    - path: "internal/tui/views/detail*.go"
      instructions: |
        Detail view — the most complex view. Additional rules:
        - EnrichDetailResultMsg must check both ResourceType AND ResourceID
        - RelatedCheckResultMsg must check both ResourceType AND SourceResourceID
        - fieldList is rebuilt from RawStruct when set to nil
        - refreshViewportContent() calls buildFieldList() if fieldList is nil

    - path: "cmd/**"
      instructions: |
        CLI entry points and code generators. The main binary is cmd/a9s/.
        Generators (readmegen, viewsgen, refgen) produce files that should
        not be manually edited.

  # -- Auto-review settings --
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "wip"
    drafts: false
    base_branches:
      - "main"

  # -- Finishing touches --
  finishing_touches:
    docstrings:
      enabled: false    # Go uses godoc conventions, not generated docstrings
    unit_tests:
      enabled: false    # we have our own TDD workflow with QA agents
    simplify:
      enabled: false    # we run our own code-simplifier agent

  # -- Tools --
  tools:
    golangci-lint:
      enabled: true
      config_file: ".golangci.yml"

    shellcheck:
      enabled: true

    yamllint:
      enabled: true

    markdownlint:
      enabled: true

    actionlint:
      enabled: true

    gitleaks:
      enabled: true

    # Disable tools not relevant to this Go project
    eslint:
      enabled: false
    biome:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    rubocop:
      enabled: false
    swiftlint:
      enabled: false
    detekt:
      enabled: false
    ruff:
      enabled: false
    flake8:
      enabled: false
    pylint:
      enabled: false
    clippy:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    buf:
      enabled: false
    oxc:
      enabled: false
    stylelint:
      enabled: false
    htmlhint:
      enabled: false
    brakeman:
      enabled: false
    prismaLint:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    fortitudeLint:
      enabled: false
    sqlfluff:
      enabled: false
    dotenvLint:
      enabled: false
    blinter:
      enabled: false
    smartyLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    psscriptanalyzer:
      enabled: false

# ---------------------------------------------------------------------------
# Chat
# ---------------------------------------------------------------------------
chat:
  auto_reply: true

# ---------------------------------------------------------------------------
# Knowledge Base
# ---------------------------------------------------------------------------
knowledge_base:
  opt_out: false
  web_search:
    enabled: false              # not needed; project is self-contained
  learnings:
    scope: auto                 # learn from merged PRs
  issues:
    scope: auto
  pull_requests:
    scope: auto
  code_guidelines:
    enabled: true
    filePatterns:
      # Auto-detected: CLAUDE.md, AGENTS.md
      # Add project-specific guides:
      - "docs/architecture.md"
      - "docs/go-codebase-checklist.md"
