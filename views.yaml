        width: 9
    detail:
      - NodegroupName
      - ClusterName
      - Status
      - InstanceTypes
      - AmiType
      - CapacityType
      - DiskSize
      - ScalingConfig
      - NodeRole
      - NodegroupArn
      - ReleaseVersion
