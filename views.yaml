# a9s view configuration
# Customize which columns appear in list views and which fields appear in detail views.
# Paths use AWS SDK Go struct field names (case-insensitive matching).
# See views_reference.yaml for all available paths.

views:
  s3:
    list:
      Bucket Name:
        path: Name
        width: 20
      Creation Date:
        path: CreationDate
        width: 22
    detail:
      - BucketArn
      - BucketRegion
      - CreationDate

  s3_objects:
    list:
      Key:
        path: Key
        width: 20
      Size:
        path: Size
        width: 12
      Last Modified:
        path: LastModified
        width: 22
    #      Storage Class:
    #        path: StorageClass
    #        width: 16
    detail:
      - Key
      - Size
      - LastModified
      - StorageClass
      - ETag
      - Owner

  ec2:
    list:
      Instance ID:
        path: InstanceId
        width: 20
      State:
        path: State.Name
        width: 12
      Type:
        path: InstanceType
        width: 14
      Private IP:
        path: PrivateIpAddress
        width: 16
      Public IP:
        path: PublicIpAddress
        width: 16
      Launch Time:
        path: LaunchTime
        width: 22
    detail:
      - InstanceId
      - State
      - InstanceType
      - ImageId
      - VpcId
      - SubnetId
      - PrivateIpAddress
      - PublicIpAddress
      - SecurityGroups
      - LaunchTime
      - Architecture
      - Platform
      - Tags

  dbi:
    list:
      DB Identifier:
        path: DBInstanceIdentifier
        width: 28
      Engine:
        path: Engine
        width: 12
      Version:
        path: EngineVersion
        width: 10
      Status:
        path: DBInstanceStatus
        width: 14
      Class:
        path: DBInstanceClass
        width: 16
      Endpoint:
        path: Endpoint.Address
        width: 40
      Multi-AZ:
        path: MultiAZ
        width: 10
    detail:
      - DBInstanceIdentifier
      - Engine
      - EngineVersion
      - DBInstanceStatus
      - DBInstanceClass
      - Endpoint
      - MultiAZ
      - AllocatedStorage
      - StorageType
      - AvailabilityZone

  redis:
    list:
      Cluster ID:
        path: CacheClusterId
        width: 28
      Version:
        path: EngineVersion
        width: 10
      Node Type:
        path: CacheNodeType
        width: 18
      Status:
        path: CacheClusterStatus
        width: 14
      Nodes:
        path: NumCacheNodes
        width: 8
      Endpoint:
        path: ConfigurationEndpoint.Address
        width: 40
    detail:
      - CacheClusterId
      - Engine
      - EngineVersion
      - CacheClusterStatus
      - CacheNodeType
      - NumCacheNodes
      - ConfigurationEndpoint
      - PreferredAvailabilityZone

  dbc:
    list:
      Cluster ID:
        path: DBClusterIdentifier
        width: 28
      Version:
        path: EngineVersion
        width: 10
      Status:
        path: Status
        width: 14
      Instances:
        path: DBClusterMembers
        width: 10
      Endpoint:
        path: Endpoint
        width: 48
    detail:
      - DBClusterIdentifier
      - Engine
      - EngineVersion
      - Status
      - Endpoint
      - ReaderEndpoint
      - Port
      - StorageEncrypted
      - DBClusterMembers

  eks:
    list:
      Cluster Name:
        path: Name
        width: 28
      Version:
        path: Version
        width: 10
      Status:
        path: Status
        width: 14
      Endpoint:
        path: Endpoint
        width: 48
      Platform Version:
        path: PlatformVersion
        width: 18
    detail:
      - Name
      - Version
      - Status
      - Endpoint
      - PlatformVersion
      - Arn
      - RoleArn
      - KubernetesNetworkConfig

  secrets:
    list:
      Secret Name:
        path: Name
        width: 36
      Description:
        path: Description
        width: 30
      Last Accessed:
        path: LastAccessedDate
        width: 18
      Last Changed:
        path: LastChangedDate
        width: 18
      Rotation:
        path: RotationEnabled
        width: 10
    detail:
      - Name
      - Description
      - LastAccessedDate
      - LastChangedDate
      - RotationEnabled
      - ARN
      - KmsKeyId
      - Tags

  vpc:
    list:
      VPC ID:
        path: VpcId
        width: 24
      CIDR Block:
